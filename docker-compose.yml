services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-filevault}
      POSTGRES_USER: ${POSTGRES_USER:-filevault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-filevault_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-filevault} -d ${POSTGRES_DB:-filevault}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Development (default — no profile flag needed)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-filevault}
      POSTGRES_USER: ${POSTGRES_USER:-filevault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-filevault_secret}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production-use-a-long-random-string}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      JWT_ACCESS_TOKEN_LIFETIME_MINUTES: ${JWT_ACCESS_TOKEN_LIFETIME_MINUTES:-15}
      JWT_REFRESH_TOKEN_LIFETIME_DAYS: ${JWT_REFRESH_TOKEN_LIFETIME_DAYS:-7}
      FILE_STORAGE_PATH: /app/storage/uploads
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-10}
      MAX_STORAGE_QUOTA_MB: ${MAX_STORAGE_QUOTA_MB:-100}
    volumes:
      - file_storage:/app/storage/uploads
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command:
      [
        "python",
        "manage.py",
        "runserver",
        "0.0.0.0:8000",
      ]
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command:
      [
        "sh",
        "-c",
        "npm install && npm run dev -- --host 0.0.0.0 --port 5173",
      ]
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Production profile (make prod / docker compose --profile prod up)
  # ---------------------------------------------------------------------------
  backend-prod:
    profiles: [prod]
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-filevault}
      POSTGRES_USER: ${POSTGRES_USER:-filevault}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-filevault_secret}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me-in-production-use-a-long-random-string}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,backend-prod}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
      JWT_ACCESS_TOKEN_LIFETIME_MINUTES: ${JWT_ACCESS_TOKEN_LIFETIME_MINUTES:-15}
      JWT_REFRESH_TOKEN_LIFETIME_DAYS: ${JWT_REFRESH_TOKEN_LIFETIME_DAYS:-7}
      REFRESH_COOKIE_SECURE: ${REFRESH_COOKIE_SECURE:-True}
      FILE_STORAGE_PATH: /app/storage/uploads
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-10}
      MAX_STORAGE_QUOTA_MB: ${MAX_STORAGE_QUOTA_MB:-100}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
    volumes:
      - file_storage:/app/storage/uploads
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "exec gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers $${GUNICORN_WORKERS:-2} --threads 2 --timeout 120 --access-logfile - --error-logfile -",
      ]
    restart: unless-stopped

  frontend-prod:
    profiles: [prod]
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000/api}
    ports:
      - "8080:80"
    depends_on:
      backend-prod:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  file_storage:
  frontend_node_modules:
